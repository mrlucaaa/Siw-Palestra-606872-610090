<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/base :: head('Login - SIW Fitness')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <section class="sec sec--dark" style="min-height: 100vh; display: flex; align-items: center; justify-content: center;">
        <div class="wrap" style="width: 100%; max-width: 500px; padding: 2rem;">
            <h2 style="margin-bottom: 2rem; text-align: center;">Accedi</h2>
            
            <form th:action="@{/login}" method="post" style="background: rgba(255,255,255,0.05); padding: 2rem; border-radius: 8px;">
                
                <div th:if="${param.error}" style="color: #ff6b6b; margin-bottom: 1rem; text-align: center; font-weight: bold;">
                    Credenziali non valide, riprova.
                </div>
                <div th:if="${param.logout}" style="color: #51cf66; margin-bottom: 1rem; text-align: center; font-weight: bold;">
                    Disconnessione effettuata con successo.
                </div>

                <div class="form-group" style="margin-bottom: 1.5rem;">
                    <label for="username" style="display: block; margin-bottom: .5rem; color: var(--paper);">Username</label>
                    <input type="text" id="username" name="username" required style="width: 100%; padding: .75rem; border: none; border-radius: 4px;" />
                </div>
                
                <div class="form-group" style="margin-bottom: 2rem;">
                    <label for="password" style="display: block; margin-bottom: .5rem; color: var(--paper);">Password</label>
                    <input type="password" id="password" name="password" required style="width: 100%; padding: .75rem; border: none; border-radius: 4px;" />
                </div>
                
                <button type="submit" class="btn btn-red" style="width: 100%; justify-content: center;">Login</button>
                
                <div style="margin: 1.5rem 0; text-align: center; color: var(--paper); display: flex; align-items: center;">
                    <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.2);"></div>
                    <span style="padding: 0 1rem; font-size: 0.9rem;">OPPURE</span>
                    <div style="flex: 1; height: 1px; background: rgba(255,255,255,0.2);"></div>
                </div>
                
                <a th:href="@{/oauth2/authorization/google}" class="btn btn-ghost" style="width: 100%; justify-content: center; background: white; color: #333; border: none; display: flex; align-items: center; gap: 0.5rem; text-decoration: none;">
                    <svg width="18" height="18" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.7 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
                    <span style="font-weight: bold; font-family: Roboto, Arial, sans-serif;">Accedi con Google</span>
                </a>
                
                <p style="margin-top: 1.5rem; text-align: center; font-size: 0.9rem;">
                    Non hai un account? <a th:href="@{/register}" style="color: var(--red); font-weight: bold;">Registrati ora</a>
                </p>
            </form>
        </div>
    </section>

    <div th:replace="~{fragments/base :: footer}"></div>
</body>
</html>
