<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/base :: head('Errore di sistema - SIW Fitness')}"></head>
<body>
    <div th:replace="~{fragments/base :: navbar}"></div>

    <section class="sec sec--dark" style="min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center;">
        <div class="wrap">
            <h1 style="font-size: 8rem; color: var(--red); margin-bottom: 1rem; line-height: 1;">500</h1>
            <h2 style="font-size: 3rem; margin-bottom: 2rem;">Errore interno del server</h2>
            <p style="color: rgba(247,244,239, 0.7); margin-bottom: 2rem; font-size: 1.2rem; max-width: 600px; margin-left: auto; margin-right: auto;">
                Si è verificato un problema imprevisto durante l'elaborazione della tua richiesta. I nostri tecnici sono stati avvisati.
            </p>
            <a th:href="@{/}" class="btn btn-ghost" style="font-size: 1.2rem; padding: 1rem 3rem;">Torna alla Home</a>
        </div>
    </section>

    <div th:replace="~{fragments/base :: footer}"></div>
</body>
</html>
